# =============================================================================
# QORIA OS - Local Development Environment
# =============================================================================

services:
  # --- PostgreSQL (Relational Data Hub) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qoria_os
      POSTGRES_USER: qoria_user
      POSTGRES_PASSWORD: qoria_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qoria_user -d qoria_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Neo4j (Knowledge Graph) ---
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/qoria_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  # --- QORIA OS Backend ---
  api:
    build:
      context: .
      target: production
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://qoria_user:qoria_dev_password@postgres:5432/qoria_os?schema=public
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: qoria_dev_password
      JWT_SECRET: dev-secret-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
