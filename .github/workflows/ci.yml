# =============================================================================
# Qorway OS - CI Pipeline (4 Gates of Validation)
# =============================================================================
# Gate 1: Static Analysis & Contracts
# Gate 2: Automated Tests (Unit + Multi-Tenant Integration)
# Gate 3: SecOps & IP Protection
# Gate 4: Build & Containerization
# =============================================================================

name: Qorway OS CI Pipeline

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**', 'refactor/**', 'claude/**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # =========================================================================
  # Gate 1: Static Analysis & Contracts
  # =========================================================================
  gate-1-static-analysis:
    name: "Gate 1: Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript strict check (no `any` allowed)
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npx prettier --check "src/**/*.ts"

  # =========================================================================
  # Gate 2: Automated Tests
  # =========================================================================
  gate-2-tests:
    name: "Gate 2: Tests"
    runs-on: ubuntu-latest
    needs: gate-1-static-analysis
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qorway_os_test
          POSTGRES_USER: qorway_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://qorway_user:test_password@localhost:5432/qorway_os_test?schema=public

      - name: Run unit tests with coverage
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://qorway_user:test_password@localhost:5432/qorway_os_test?schema=public
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test

      - name: Check coverage threshold (85%)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Line coverage: $COVERAGE%"

  # =========================================================================
  # Gate 3: SecOps & IP Protection
  # =========================================================================
  gate-3-security:
    name: "Gate 3: Security"
    runs-on: ubuntu-latest
    needs: gate-1-static-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=critical

  # =========================================================================
  # Gate 4: Build & Containerization
  # =========================================================================
  gate-4-build:
    name: "Gate 4: Build"
    runs-on: ubuntu-latest
    needs: [gate-2-tests, gate-3-security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build NestJS application
        run: npm run build

      - name: Build Docker image
        run: |
          docker build \
            --tag qorway-os-gateway:${{ github.sha }} \
            --tag qorway-os-gateway:latest \
            .
